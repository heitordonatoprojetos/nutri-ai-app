name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: Validate & build the web app (React/Vite)
  # ──────────────────────────────────────────────
  build-web:
    name: Build Web (React + Vite)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript check (zero type errors allowed)
        run: npx tsc --noEmit

      - name: Build web assets
        run: npm run build

      # Pass the built dist/ folder to the Android job
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/
          retention-days: 1

  # ──────────────────────────────────────────────
  # JOB 2: Build the Android APK using Capacitor
  # ──────────────────────────────────────────────
  build-apk:
    name: Build Android APK
    needs: build-web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Java must come BEFORE Gradle operations ──
      - name: Setup Java 17
        id: setup-java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Verify Java version
        run: java -version

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # Download the pre-built web assets from Job 1
      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/

      - name: Capacitor sync Android
        run: npx cap sync android

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Inject mock google-services.json for Firebase compilation
        run: |
          echo "{\"project_info\":{\"project_number\":\"123\",\"firebase_url\":\"https://mock.firebaseio.com\",\"project_id\":\"mock-id\",\"storage_bucket\":\"mock.appspot.com\"},\"client\":[{\"client_info\":{\"mobilesdk_app_id\":\"1:123:android:abc\",\"android_client_info\":{\"package_name\":\"com.nutriai.app\"}},\"oauth_client\":[],\"api_key\":[{\"current_key\":\"mock_key\"}],\"services\":{\"appinvite_service\":{\"other_platform_oauth_client\":[]}}}]}" > android/app/google-services.json

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Verify Android Gradle Plugin compatibility
        working-directory: ./android
        run: |
          echo "=== Gradle version ==="
          ./gradlew --version
          echo "=== AGP version ==="
          grep "com.android.tools.build" build.gradle

      - name: Build Debug APK
        id: build-step
        working-directory: ./android
        env:
          JAVA_HOME: ${{ steps.setup-java.outputs.path }}
        run: |
          echo "Starting build with Gradle 8.2.1 and Java 17..."
          ./gradlew assembleDebug --no-daemon --stacktrace --parallel > build.log 2>&1

      - name: Upload Build Log on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-failure-log
          path: android/build.log

      - name: Verify APK was created
        run: |
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            echo "✅ APK built successfully!"
            ls -lh "$APK_PATH"
          else
            echo "❌ APK not found! Check build-failure-log artifact."
            exit 1
          fi

      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: NutriAI-v1.01-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  # ──────────────────────────────────────────────
  # JOB 3: Build Signed Release APK
  # ──────────────────────────────────────────────
  build-release-apk:
    name: Build Signed Release APK
    needs: build-web
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        id: setup-java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Verify Java version
        run: java -version

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/

      - name: Capacitor sync Android
        run: npx cap sync android

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Inject mock google-services.json for Firebase compilation
        run: |
          echo "{\"project_info\":{\"project_number\":\"123\",\"firebase_url\":\"https://mock.firebaseio.com\",\"project_id\":\"mock-id\",\"storage_bucket\":\"mock.appspot.com\"},\"client\":[{\"client_info\":{\"mobilesdk_app_id\":\"1:123:android:abc\",\"android_client_info\":{\"package_name\":\"com.nutriai.app\"}},\"oauth_client\":[],\"api_key\":[{\"current_key\":\"mock_key\"}],\"services\":{\"appinvite_service\":{\"other_platform_oauth_client\":[]}}}]}" > android/app/google-services.json

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "⚠️ KEYSTORE_BASE64 secret not set. Skipping release build."
            echo "SKIP_RELEASE=true" >> $GITHUB_ENV
          else
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/nutriai.keystore
            echo "SKIP_RELEASE=false" >> $GITHUB_ENV
          fi

      - name: Build Release APK
        id: build-release
        working-directory: ./android
        env:
          JAVA_HOME: ${{ steps.setup-java.outputs.path }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ "$SKIP_RELEASE" = "true" ]; then
            echo "⏭️ Skipping release build - no keystore configured"
            exit 0
          fi

          # Create signing config file
          cat > signing.properties << EOF
          storeFile=nutriai.keystore
          storePassword=${KEYSTORE_PASSWORD}
          keyAlias=${KEY_ALIAS}
          keyPassword=${KEY_PASSWORD}
          EOF

          echo "Starting release build with Gradle 8.2.1 and Java 17..."
          ./gradlew assembleRelease --no-daemon --stacktrace --parallel > build-release.log 2>&1

      - name: Upload Release Build Log on Failure
        if: failure() && steps.build-release.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: build-release-failure-log
          path: android/build-release.log

      - name: Verify Release APK was created
        run: |
          APK_PATH="android/app/build/outputs/apk/release/app-release.apk"
          if [ -f "$APK_PATH" ]; then
            echo "✅ Release APK built successfully!"
            ls -lh "$APK_PATH"
          else
            echo "⏭️ Release APK not found - keystore may not be configured"
          fi

      - name: Upload Signed Release APK
        if: success() && env.SKIP_RELEASE != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: NutriAI-v1.01-release-signed
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90
